worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css image/png;

    upstream api_server {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;

        # Allow up to 5 GB (orthomosaic TIFFs + drone ZIP archives)
        client_max_body_size 5G;

        # Do NOT buffer request body to disk — stream directly to upstream.
        # Essential for 5 GB uploads: without this NGINX would buffer the
        # entire upload before forwarding it, consuming huge disk space.
        proxy_request_buffering off;

        # Long timeouts for large uploads and ODM status polling
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout   60s;

        # ── Tile serving with long-term cache ─────────────────────────────
        # Tiles are immutable once generated; clients can cache for 1 year.
        location /reports/tiles/ {
            alias /usr/share/nginx/html/reports/tiles/;
            autoindex off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";

            # Serve pre-compressed tiles if available
            gzip_static on;
        }

        # ── Static uploads (orthomosaics) ─────────────────────────────────
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            autoindex off;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Static reports (PDFs, annotated images, orthomosaics) ─────────
        location /reports/ {
            alias /usr/share/nginx/html/reports/;
            autoindex off;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── FastAPI proxy ──────────────────────────────────────────────────
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Disable response buffering so streaming uploads aren't stalled
            proxy_buffering off;
        }

        # ── Root redirect → API docs ───────────────────────────────────────
        location = / {
            return 302 /api/docs;
        }
    }
}
