version: "3.9"

services:
  api:
    build: ./services/api
    container_name: api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
    environment:
      DATABASE_URL: postgresql+psycopg2://webcount:webcount@postgres:5432/webcount
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGE_ME}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      AUTO_CREATE_DB: ${AUTO_CREATE_DB:-true}
      UPLOAD_DIR: /app/data/uploads
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-http://localhost:8080/uploads}
    depends_on:
      postgres:
        condition: service_healthy
      ai-yolo:
        condition: service_started
    networks:
      - webcount_net

  ai-yolo:
    build: ./services/ai-yolo
    container_name: ai-yolo
    restart: unless-stopped
    networks:
      - webcount_net

  gradio-ui:
    build: ./services/gradio-ui
    container_name: gradio-ui
    restart: unless-stopped
    ports:
      - "7860:7860"
    networks:
      - webcount_net

  nginx:
    build: ./services/nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./data/uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - api
    networks:
      - webcount_net

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: webcount
      POSTGRES_USER: webcount
      POSTGRES_PASSWORD: webcount
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webcount -d webcount"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - webcount_net

volumes:
  pgdata:

networks:
  webcount_net:
    driver: bridge
